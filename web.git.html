<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Mi Web Sencilla</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }
    header {
      background: #333;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }
    nav {
      background: #555;
      padding: 0.5rem 1rem;
    }
    nav a {
      color: #fff;
      margin-right: 1rem;
      text-decoration: none;
      font-size: 0.95rem;
    }
    main {
      max-width: 900px;
      margin: 1.5rem auto;
      background: #fff;
      padding: 1.5rem;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
    }
    h1, h2 {
      margin-top: 0;
    }
    footer {
      text-align: center;
      padding: 1rem;
      background: #333;
      color: #fff;
      margin-top: 2rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Mi Web Sencilla</h1>
    <p>Un ejemplo básico en HTML y CSS</p>
  </header>

  <nav>
    <a href="#inicio">Inicio</a>
    <a href="#sobre-mi">Sobre mí</a>
    <a href="#contacto">Contacto</a>
  </nav>

  <main>
    <section id="inicio">
      <h2>Inicio</h2>
      <p>
        Este es un espacio para poder explicar un poco los comandos de GIT
      </p>
    </section>

    <section id="sobre-mi">
      <h2>Sobre mí</h2>
      <p>
        Un grupo random explicando GIT
      </p>
    </section>

    <section id="contacto">
      <h2>Contacto</h2>
      <p>
        Contacto: hola@gmail.com
      </p>
    </section>
  </main>

  <footer>
    &copy; 2026 Mi Web Sencilla
  </footer>
</body>
</html>
